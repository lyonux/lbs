[global]
log-level = "info"
shutdown-cleanup = false

# TCP forwarding rules
# Format: [entry.tcp."<vip>"]
#         <vip_port> = ["<target_ip>:<target_port>", ...]

# [entry.tcp."172.16.192.111"]
# Forward TCP port 898 to a single target
# 898 = ["192.168.2.94:898"]

# Example: Forward to multiple targets (load balancing)
# 8080 = [
#     "192.168.1.10:8080",
#     "192.168.1.11:8080",
#     "192.168.1.12:8080",
# ]

# UDP forwarding rules
# Format: [entry.udp."<vip>"]
#         <vip_port> = ["<target_ip>:<target_port>", ...]

# [entry.udp."172.16.192.111"]
# Forward UDP port 898 to a single target
# 898 = ["192.168.2.94:898"]
# 891 = ["192.168.2.94:891"]
